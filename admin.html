<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RPD Admin | Management Console</title>
  <style>
    :root {
      --rpd-blue: #002147;
      --rpd-gold: #C5A059;
      --danger: #b00020;
      --success: #2e7d32;
    }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
    .admin-container { max-width: 600px; margin: 0 auto; background: white; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); border-top: 5px solid var(--rpd-blue); overflow: hidden; }
    .header { background: var(--rpd-blue); color: white; padding: 1.5rem; text-align: center; }
    .content { padding: 2rem; }
    
    label { display: block; margin-top: 1rem; font-weight: bold; font-size: 0.8rem; color: var(--rpd-blue); }
    input { width: 100%; padding: 0.8rem; margin-top: 0.3rem; border: 2px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 1rem; }
    
    .btn-search { width: 100%; background: var(--rpd-blue); color: white; border: none; padding: 1rem; margin-top: 1rem; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    
    .preview-box { margin-top: 2rem; padding: 1.5rem; border: 1px solid #e0e0e0; border-radius: 8px; background: #f9f9f9; display: none; }
    .preview-box h3 { margin-top: 0; color: var(--rpd-blue); border-bottom: 2px solid var(--rpd-gold); padding-bottom: 5px; }
    .data-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem; border-bottom: 1px dashed #ccc; padding-bottom: 4px; }
    .data-label { font-weight: bold; color: #555; }

    .action-zone { margin-top: 1.5rem; display: none; }
    .btn-clear { width: 100%; background: var(--danger); color: white; border: none; padding: 1.2rem; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 1rem; }
    
    #statusMsg { margin-top: 1rem; text-align: center; font-weight: bold; }
    .back-link { display: block; text-align: center; margin-top: 2rem; color: var(--rpd-blue); text-decoration: none; font-size: 0.8rem; }
  </style>
</head>
<body>

<div class="admin-container">
  <div class="header">
    <h2 style="margin:0">Admin Management</h2>
    <p style="margin:5px 0 0; font-size: 0.8rem; opacity:0.8">Search & Modify Records</p>
  </div>

  <div class="content">
    <div id="searchStep">
      <label>WARRANT ID (Column A)</label>
      <input type="text" id="warrantId" placeholder="Enter ID exactly" required>
      <button type="button" id="findBtn" class="btn-search">Find Record</button>
    </div>

    <div id="previewBox" class="preview-box">
      <h3>Record Found</h3>
      <div id="previewContent"></div>
      
      <div class="action-zone" id="actionZone">
        <label>ADMIN PASSWORD</label>
        <input type="password" id="adminPass" placeholder="Enter password">
        <button type="button" id="clearBtn" class="btn-clear">Clear Balance ($0.00)</button>
      </div>
    </div>

    <div id="statusMsg"></div>
    <a href="index.html" class="back-link">← Return to Search</a>
  </div>
</div>

<script>
  // --- CONFIGURACIÓN ---
  const SHEET_ID = '1k_cpfT-NwDUT3-6kAoVwasAOYqaokSpa'; 
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzbJun6qFbl1tkUxc41r2YSVbRxU8-10NsYuWln0m4ZrjY6SDHwBAwipwJ3dglZ74dgNA/exec';
  const CSV_URL = `https://docs.google.com/spreadsheets/d/e/2PACX-1vQQPoeUZ2RT_fk_-SV9-vc93gjcdXkhDInrq_GQVCV7x9h-WXTl_NdQSNbz8vHlPQ/pub?gid=742505887&single=true&output=csv`;

  let currentWarrantID = null;

  // Función simple para procesar líneas de CSV
  function parseCSV(text) {
    const lines = text.split(/\r?\n/);
    return lines.map(line => {
      // Esta regex separa por comas pero ignora las comas dentro de comillas
      const result = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
      return result ? result.map(val => val.replace(/"/g, '').trim()) : [];
    });
  }

  // BOTÓN BUSCAR
  document.getElementById('findBtn').addEventListener('click', async function() {
    const idInput = document.getElementById('warrantId').value.trim();
    const status = document.getElementById('statusMsg');
    const preview = document.getElementById('previewBox');
    const content = document.getElementById('previewContent');
    const action = document.getElementById('actionZone');

    if (!idInput) {
      alert("Please enter a Warrant ID");
      return;
    }

    status.innerHTML = "Searching...";
    status.style.color = "blue";
    preview.style.display = "none";

    try {
      const resp = await fetch(CSV_URL);
      if (!resp.ok) throw new Error("Could not connect to Google Sheets");
      
      const text = await resp.text();
      const rows = parseCSV(text);
      
      // Buscamos en la Columna A (índice 0)
      const found = rows.find(r => r[0] === idInput);

      if (found) {
        currentWarrantID = found[0];
        status.innerHTML = "";
        preview.style.display = "block";
        action.style.display = "block";
        content.innerHTML = `
          <div class="data-row"><span class="data-label">Name:</span> <span>${found[2]} ${found[1]}</span></div>
          <div class="data-row"><span class="data-label">Violation:</span> <span>${found[5]}</span></div>
          <div class="data-row"><span class="data-label">Current Balance:</span> <span style="color:red; font-weight:bold">$${found[8]}</span></div>
        `;
      } else {
        status.innerHTML = "ID NOT FOUND";
        status.style.color = "red";
      }
    } catch (err) {
      alert("Error: " + err.message);
      status.innerHTML = "Connection Error";
    }
  });

  // BOTÓN LIMPIAR DEUDA
  document.getElementById('clearBtn').addEventListener('click', async function() {
    const pass = document.getElementById('adminPass').value;
    const status = document.getElementById('statusMsg');

    if (!pass) {
      alert("Password is required");
      return;
    }

    if (!confirm("Are you sure? This will set balance to $0 in the Google Sheet.")) return;

    status.innerHTML = "Updating Google Sheets...";
    status.style.color = "blue";

    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify({ warrantId: currentWarrantID, password: pass })
      });

      status.innerHTML = "SUCCESS: BALANCE CLEARED";
      status.style.color = "green";
      document.getElementById('previewBox').style.display = "none";
      document.getElementById('warrantId').value = "";
      document.getElementById('adminPass').value = "";
    } catch (err) {
      alert("Error sending command");
      status.innerHTML = "Error";
    }
  });
</script>

</body>
</html>
