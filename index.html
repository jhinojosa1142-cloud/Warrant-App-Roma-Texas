<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RPD | Warrant Search System</title>
  <style>
    :root {
      --rpd-blue: #002147;
      --rpd-gold: #C5A059;
      --rpd-silver: #e0e0e0;
      --danger: #b00020;
      --text-dark: #1a1a1a;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background-color: #f0f2f5;
      color: var(--text-dark);
      margin: 0;
      min-height: 100vh;
    }

    header {
      background-color: var(--rpd-blue);
      color: white;
      padding: 1.5rem;
      border-bottom: 4px solid var(--rpd-gold);
      text-align: center;
    }

    .main-content {
      max-width: 1100px;
      margin: 2rem auto;
      width: 90%;
    }

    .search-panel {
      background: white;
      border-radius: 8px;
      padding: 2rem;
      box-shadow: 0 2px 15px rgba(0,0,0,0.1);
      border-left: 5px solid var(--rpd-blue);
      margin-bottom: 2rem;
    }

    .search-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
    }

    .field-group { display: flex; flex-direction: column; }
    
    label {
      font-weight: 700;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      font-size: 0.75rem;
      color: var(--rpd-blue);
    }

    input {
      padding: 0.8rem;
      border: 2px solid var(--rpd-silver);
      border-radius: 4px;
    }

    .btn-search {
      background-color: var(--rpd-blue);
      color: white;
      border: none;
      padding: 1rem;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 8px;
      overflow: hidden;
    }

    thead { background-color: var(--rpd-blue); color: white; }
    th, td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--rpd-silver); }

    .loader {
      display: none;
      text-align: center;
      padding: 2rem;
      font-weight: bold;
      color: var(--rpd-blue);
    }
  </style>
</head>
<body>

  <header>
    <h1>CITY OF ROMA POLICE DEPARTMENT</h1>
    <p>Warrant Inquiry System | Internal Use Only</p>
  </header>

  <main class="main-content">
    <section class="search-panel">
      <form id="searchForm">
        <div class="search-grid">
          <div class="field-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" required>
          </div>
          <div class="field-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" required>
          </div>
          <div class="field-group">
            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" required>
          </div>
          <button type="submit" class="btn-search">Run Query</button>
        </div>
      </form>
    </section>

    <div id="loader" class="loader">ACCESSING SECURE DATABASE...</div>

    <section style="overflow-x: auto;">
      <table id="resultsTable">
        <thead>
          <tr>
            <th>Warrant #</th>
            <th>Subject</th>
            <th>D.O.B.</th>
            <th>Charge</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="resultsBody">
          <tr><td colspan="5" style="text-align:center;">Enter subject details to begin.</td></tr>
        </tbody>
      </table>
    </section>
  </main>

  <script>
    // 1. CONFIGURATION
    const SHEET_ID = '1k_cpfT-NwDUT3-6kAoVwasAOYqaokSpa'; // Replace with your actual ID
    const SHEET_NAME = 'Sheet1'; // Name of the tab in Google Sheets

    document.getElementById('searchForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const fName = document.getElementById('firstName').value.toUpperCase();
      const lName = document.getElementById('lastName').value.toUpperCase();
      const dob = document.getElementById('dob').value;
      
      const loader = document.getElementById('loader');
      const resultsBody = document.getElementById('resultsBody');
      
      loader.style.display = 'block';
      resultsBody.innerHTML = '';

      // 2. THE QUERY (SQL-style)
      // Change column letters (A, B, C) to match your Sheet columns
      // Example: A=WarrantID, B=FirstName, C=LastName, D=DOB, E=Charge, F=Status
      const query = encodeURIComponent(`SELECT A, B, C, D, E, F WHERE (upper(B) contains '${fName}' AND upper(C) contains '${lName}') OR D = date '${dob}'`);
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tq=${query}&sheet=${SHEET_NAME}`;

      fetch(url)
        .then(res => res.text())
        .then(data => {
          // Remove Google's JSON wrapper
          const json = JSON.parse(data.substring(47, data.length - 2));
          const rows = json.table.rows;
          
          loader.style.display = 'none';
          
          if (rows.length === 0) {
            resultsBody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:red;">NO RECORDS FOUND</td></tr>';
            return;
          }

          rows.forEach(row => {
            const tr = document.createElement('tr');
            row.c.forEach(cell => {
              const td = document.createElement('td');
              td.textContent = cell ? cell.v : '';
              tr.appendChild(td);
            });
            resultsBody.appendChild(tr);
          });
        })
        .catch(err => {
          loader.style.display = 'none';
          resultsBody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Error connecting to database.</td></tr>';
          console.error(err);
        });
    });
  </script>
</body>
</html>
